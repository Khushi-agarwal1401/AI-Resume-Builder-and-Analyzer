version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
        NEXT_PUBLIC_STRIPE_PRO_PRICE_ID_MONTHLY: ${NEXT_PUBLIC_STRIPE_PRO_PRICE_ID_MONTHLY:-}
        NEXT_PUBLIC_STRIPE_PRO_PRICE_ID_YEARLY: ${NEXT_PUBLIC_STRIPE_PRO_PRICE_ID_YEARLY:-}
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - LINKEDIN_CLIENT_ID=${LINKEDIN_CLIENT_ID:-}
      - LINKEDIN_CLIENT_SECRET=${LINKEDIN_CLIENT_SECRET:-}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - NEXT_PUBLIC_STRIPE_PRO_PRICE_ID_MONTHLY=${NEXT_PUBLIC_STRIPE_PRO_PRICE_ID_MONTHLY:-}
      - NEXT_PUBLIC_STRIPE_PRO_PRICE_ID_YEARLY=${NEXT_PUBLIC_STRIPE_PRO_PRICE_ID_YEARLY:-}
      - STRIPE_PRO_PRICE_ID_MONTHLY=${STRIPE_PRO_PRICE_ID_MONTHLY:-}
      - STRIPE_PRO_PRICE_ID_YEARLY=${STRIPE_PRO_PRICE_ID_YEARLY:-}
      - ADMIN_EMAILS=${ADMIN_EMAILS:-admin@resumeai.com}
      - NEXT_PUBLIC_SENTRY_DSN=${NEXT_PUBLIC_SENTRY_DSN:-}
      - SENTRY_ORG=${SENTRY_ORG:-}
      - SENTRY_PROJECT=${SENTRY_PROJECT:-}
    restart: unless-stopped
